<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Enrollment Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <!-- JsonPowerDB -->
    <script src="https://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>

<body onload="initForm();">

<div class="container">
    <h2>Student Enrollment Form</h2>

    <form id="studentForm">

        <div class="form-group">
            <label>Roll No (Primary Key):</label>
            <input type="text" class="form-control" id="rollNo" placeholder="Enter Roll No">
        </div>

        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" class="form-control" id="fullName">
        </div>

        <div class="form-group">
            <label>Class:</label>
            <input type="text" class="form-control" id="studentClass">
        </div>

        <div class="form-group">
            <label>Birth Date:</label>
            <input type="date" class="form-control" id="birthDate">
        </div>

        <div class="form-group">
            <label>Address:</label>
            <input type="text" class="form-control" id="address">
        </div>

        <div class="form-group">
            <label>Enrollment Date:</label>
            <input type="date" class="form-control" id="enrollDate">
        </div>

        <button type="button" class="btn btn-success" id="saveBtn" onclick="saveData()">Save</button>
        <button type="button" class="btn btn-warning" id="updateBtn" onclick="updateData()">Update</button>
        <button type="button" class="btn btn-danger" id="resetBtn" onclick="resetForm()">Reset</button>

    </form>
</div>

    <script src="index.js"> </script>

</body>
</html>
